front:
  text: 紫元君授道傳心法
  hash: sha256:d93d42220939bce6ba44baf1eac9e7a8386a8bc96dce8e706d66b5cea1e05db7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0227_HFL_000-001a, image: hfl/0112/0112-022.png}
body:
  text: 長生隂真人註夫授道先授心心真道不二心僞道不真志管心中氣氣從心中生乃成心中至付道在師心領道心如是兩心合一心心元都不二奉師先奉心獻師先献至口若負師言空言心不至奉行先觀心心虛行不至自誤誤自心師心看誤意言發自無心怨師心不至學道先鍊心自心猶不真師心豈無二口授道說東心元向西去誑人自誑身道心元不異一心行誑心萬處亦如是授學如浮雲浮雲無定止終日妄區區不離生死地傳道須在心心口言不二願善自守心道門自將互若自心悠悠誰心肯依至如人使三師師多鬼競起真師豈出門僞師亂家鬼從此煩人心失却道中事愚人誑智心凡眼惑智眼真人教門深道來亦不逺授教先授心道士心莫散千説萬遍言真道有一門一門象三才三才出三丹三丹自三皇三皇自混沌混沌生天地天地列四極四極生造化造化生萬象萬象生萬物萬物生一門一門在一心夫學道之士知我仙教上宗萬無一人腎者即會愚者即非其道欲教授為人師與腎者説莫與愚者施以說即見非非猶師之過矣我從立天地之始其法不二只在混沌氣爲元凡俗之人妄求外法失我道元致人之有死者世世不知有萬億數也蓋為失却道根今以切論心源流行後代在心如丹用曾曾爲液使調膠最能白雪相伏感氣成龍雲騰一變七反猶曾使我五藏化知風氣堅骨壯志皮由通籠明撤如鏡詞煩不達藥在西東南北必伏日月昇騰成而在手失而在心師我父母夫妻得朋不越四象殺氣相凌撫我即在黙我即沈合我道機與我心同修文文訖天降雲龍世而不絶學士用心真言教心心真道正䖍誠修真三丹歸命九轉玄門神符靈聖天一得之結繩為證莫不因心要術無病元始教心三才終定稽首言歸知心知命繋以龍虎歌曰四者混沌五行之祖一曰曽曽爲使使爲氣氣為筋二曰隂中腸陽爲日之魂魂爲日之精精為陽陽爲父父爲胞衣三曰從白液化爲堅冰堅冰是隂中陽陽爲骨骨憑氣而生白液白液爲髓名四曰水銀水銀爲肉之氣氣爲血血化毛髮毛髮憑皮膚爲玄郭而成質可知三箇月成形十箇月生餘兩箇月沐浴合一年終稟天成象逓用五行而輪轉得名天地互寳如人受天地正氣亦爲互人我大道仙人藥寳不同在世有價之實只如世間所用金銀珊瑚碼碯真珠之類並量其功價以貴賤論之唯有我仙丹象日月之光明徹此則法天象地之寶令人服之可得長生天地齊畢皆是憑自然混沌之氣而成道焉其混沌之氣在天爲霧露在地為泉源沈如碧潭之色即是自然之道也仙士勿令錯用意妄將變黃白藥錯服食如道士得我自然之道四氣混沌至藥但服食一千日則知神化路不逺矣如四氣不足即爲神化無憑亦象至人日月不足豈爲互人乃知至人合天地文理爲聖世人以時物文理爲哲哲者自爲聖人乎乃自明其道秉世間機運動以功成法焉量其作事根性遠近時至盡化爲灰燼唯我三清宮神化藥寶然得保命長生天地齊畢其道不合傅之如傳在得人付之縁道本無形以五行氣相侵爲根人本無至以心爲至如心惡即言凶言凶即行踈行踈道不成所以三品之丹付腎不付愚愚者心暗於世終日覧仙方書訣而念之元不得其道性性由心也休粮服氣導引修行忘治榖神存魂安魄凝神定思一法巳上並是道之空門寶非長生之理九鼎之丹用田時火氣張設文武不絶候而晩成大器希聲實貴難貨至人難識也鉛爲匡郭周遭祐助青瑶為使能調風雨曾青能為一切金丹使使爲氣氣爲筋筋成大力焉夫藥不至者蓋猶曾青之力為使如人不食即無力食象氣氣象使使象食無食力乃事不勝矣夫功皆從力而生成大壯矣藥無力即無靈而安身白液金花冰生龍虎龍虎本從虚無氣中相承變法天道感化而運得四時天地成象之器然各禀發生猶四時薰蒸各有所歸生死始啓道本元者得名龍虎龍虎縁隂腸二性和合相吞伏之氣所知從虚無氣中生有為之質然修善去惡即成之三一昇騰必定䂓矩三一者准上三丹各有歸魂守一之法論至藥門中四氣筋骨血肉相承之法不失纎毫勿令失其隂陽時候每月初發火從一日數九九之法此三一法並是内三一之法用十二箇月火候管十二時配十二位行九宮象八卦合五行黄帝於皇人處請問三一之門因此流傅口訣授之如世世仙士付之亦勿令載於書方訣上以口付之若不依此三一䂓矩縱解萬般小法能變黄白救世財寳如積山亦未免身死矣終不是保命之法學而知之者普赫然還丹日月光顧星辰透明雲中見路其還丹成赫然分明亦如木中有火火雖不露其色如青中帶赤氣服之一千日化肉質换骨通靈安神定魄反老成少感天神助之通於神明不得輙妄泄露却如未得道之日可以成道矣雖未滿隂功之間且得度世不死矣可知大道無跡不失其根本人不失其父母之遺體除此一萬般妄制伏水銀成黄白不得爲真道之門也訣中恩深㑹者有數百歳之間生死不住仙士傅之逓相保護哀哉流言更無别故訣中說至藥教人長生之門至藥與世寶別仙人藥寶千錬萬化全其舊體令人服食可知神得長生之路所以我惜時貴命輕財愚者即時貴世有之財寳救一朝一夕妻妾榮華行屍走鬼輕命棄時自取滅亡百歲之間死者不知其數元君所以哀哉世人流行藥中妙道巳化真人勿令妄運動各令四人歸業守道安貧共成寶命之藥亦名酉二八二八成一斤之數白液白雪是也白雪堅冰是也所以言將酉二八酉合入二性同於丹砂勿令常人知之以火候一數九九九午之位也然三一中云三日一候三三如九九數足其帶紫黑色者元君讃之惜於後世仙士所論歌訣願明於師勿令心二者可以長生備矣可知天本無親以心爲親天本無私以心爲私天本無災以人爲災災由人興非天與人學士不辜於師子莫逆於父母即天道長久矣即人師傳備矣所以論至事不二至藥無隻天人合道明然可增其福大不雜矣若骨多則肉不勝肉多即骨不勝骨肉俱由筋可壯其力力猶曽也如無力即如有袋不盛物豈能立焉無嬰兒不戀母嬰兒失母即如藥無筋為藥由主力也無力自無神化之功如㑹者一言見三般支條不會者即經歴千書萬訣不離為愚人好先求黄白不尋讀仙書䆒其至寳者多好黄白未見一兩不覺身亡賢者好其至藥雖未見藥之玄門且積善如然神無愛利之心守道安貧天必不罰矣善慶從人師自感其至且從犠軒之前後累求仙矣陽氣數極一百八隂氣相凝自相結赫然紫色成還丹服餌長生不可説丹砂一味更無别子母相生無休歇世人不知費財寳悟者為之大還訣有訣不彰有序不述得之感之可傅可説一名土之父二名水之母三名號黄芽四為七十二石晶如無藥不成黄芽天生物子母相汨沒子母不相抛毋向子中出玄之又玄在眼前隂中有陽道自全隂腸不離得和合鍊之服之得神仙一名準中成二號大道名採續不断添之自靈在天爲霧露在地為泉源數盡隂腸數得之终不言甲子下火當旬候旬候得子母仍舊旬候數足自周旋從此堪爲兩分首一名真源秋石二名大道精魄還丹採之合冝離塵是塵仙客日月非我形隂陽自成質乾坤造化中六合皆歸一壇竈爲宫濛之又濛一旬方一候一沐又還濛数足自靈聖乾坤處處通右壇竈爲宮等句吾神室也紫元君授道傳心法終
